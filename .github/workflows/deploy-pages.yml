name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - build/build-bundle/web-mobile/**
      - build/web-mobile/**
      - .github/workflows/deploy-pages.yml
      - README.md
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Ensure .nojekyll exists
        run: touch build/web-mobile/.nojekyll

      - name: Merge build bundle resources
        run: |
          mkdir -p build/web-mobile/assets/resources
          cp -r build/build-bundle/web-mobile/resources/. build/web-mobile/assets/resources/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web-mobile

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4